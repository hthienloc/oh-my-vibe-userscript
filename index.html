<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecode Userscript Catalog</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1a1a1a;
            --accent: #3d5afe;
            --gray: #f5f5f7;
            --border: #e1e1e1;
            --error-bg: #fff5f5;
            --error-fg: #e53e3e;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --fg: #f5f5f7;
                --accent: #536dfe;
                --gray: #1c1c1e;
                --border: #333333;
                --error-bg: #2d1a1a;
                --error-fg: #fc8181;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            line-height: 1.5;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 60px; text-align: center; }
        h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 10px; }
        p.subtitle { color: #888; font-size: 1.1rem; }

        .search-container {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 20px;
        }
        #search {
            width: 100%;
            padding: 18px 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--gray);
            color: var(--fg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        #search:focus { border-color: var(--accent); box-shadow: 0 4px 25px rgba(61, 90, 254, 0.15); }

        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
            justify-content: center;
        }
        .tag-chip {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            background: var(--gray);
            color: var(--fg);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .tag-chip:hover {
            background: var(--border);
        }
        .tag-chip.active {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        .grid { 
            display: grid; 
            gap: 24px; 
            grid-template-columns: repeat(3, 1fr);
        }
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--fg); }
        .card p { color: #666; font-size: 0.95rem; margin-bottom: 15px; flex-grow: 1; }
        @media (prefers-color-scheme: dark) { .card p { color: #aaa; } }
        
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--gray);
            margin-bottom: 12px;
            color: var(--accent);
        }

        .requirement-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background: var(--error-bg);
            color: var(--error-fg);
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 15px;
            border: 1px solid rgba(229, 62, 62, 0.2);
        }

        .btn-install {
            display: block;
            text-align: center;
            padding: 12px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: opacity 0.2s;
        }
        .btn-install:hover { opacity: 0.9; }

        .footer { margin-top: 80px; text-align: center; color: #888; font-size: 0.9rem; border-top: 1px solid var(--border); padding-top: 30px; }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            z-index: 1000;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: var(--bg);
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            transform: translateY(20px);
            transition: transform 0.3s;
            border: 1px solid var(--border);
        }
        @media (prefers-color-scheme: dark) {
            .modal-content {
                box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            }
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .modal-title-group h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--fg);
        }
        .modal-title-group .modal-meta {
            color: #888;
            font-size: 0.9rem;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .modal-close {
            background: var(--gray);
            border: none;
            color: var(--fg);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .modal-close:hover {
            background: var(--border);
        }
        .modal-body {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px; /* Space for scrollbar */
        }
        .modal-body p {
            margin-bottom: 20px;
            color: var(--fg);
        }
        .code-preview-container {
            background: var(--gray);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }
        .code-preview-container pre {
            margin: 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.85rem;
            color: var(--fg);
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        .btn-secondary {
            padding: 12px 24px;
            background: var(--gray);
            color: var(--fg);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-secondary:hover {
            background: var(--border);
        }
        .card h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--fg); cursor: pointer; transition: color 0.2s; }
        .card h3:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Userscript Collection</h1>
            <p class="subtitle">Open-source utilities to enhance productivity and web experience.</p>
            <p style="color:#888; font-size:0.9rem;"><span id="last-updated">Last updated: 2026-05-02 05:42:29 UTC</span></p>
        </header>

        <div class="search-container">
            <input type="text" id="search" placeholder="Search scripts (e.g. Zalo, DUT, Jules...)" autofocus>
        </div>

        <div class="tag-filters" id="tag-filters">
            <div class="tag-chip active" data-tag="">All</div>
            <div class="tag-chip" data-tag="Social">Social</div>
            <div class="tag-chip" data-tag="Media">Media</div>
            <div class="tag-chip" data-tag="Productivity">Productivity</div>
            <div class="tag-chip" data-tag="Academic">Academic</div>
        </div>

        <div class="grid" id="script-grid">
            <!-- Scripts will be injected here -->
        </div>

        <div class="footer">
            &copy; 2025 Developed by <strong>hthienloc</strong> • <a href="https://github.com/hthienloc/oh-my-vibe-userscript" style="color: var(--accent);">GitHub Repo</a>
        </div>
    </div>

    <!-- Script Detail Modal -->
    <div class="modal-overlay" id="script-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-group">
                    <h2 id="modal-title">Script Name</h2>
                    <div class="modal-meta">
                        <span class="tag" id="modal-tag" style="margin-bottom: 0;">Tag</span>
                        <span id="modal-version">v1.0.0</span>
                    </div>
                </div>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modal-desc">Description goes here.</p>
                <div id="modal-requirement" style="display: none;"></div>
                <div class="code-preview-container">
                    <pre><code id="modal-code">Loading source code...</code></pre>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="modal-btn-close">Close</button>
                <a href="#" class="btn-install" id="modal-btn-install" style="display: inline-block;">Install Now</a>
            </div>
        </div>
    </div>

    <script>
        const scripts = [
          {
                    "name": "Enhancer for SVDUT",
                    "description": "Trang web hỗ trợ sinh viên DUT (sv.dut.udn.vn) trở nên hiện đại và tiện lợi hơn.",
                    "url": "scripts/academic/enhancer-for-svdut.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/enhancer-for-svdut.svg",
                    "tags": [
                              "academic"
                    ]
          },
          {
                    "name": "SoundCloud Downloader",
                    "description": "Download SoundCloud tracks with embedded ID3 metadata (title, artist, album, cover art) locally.",
                    "url": "scripts/media/soundcloud-downloader.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/soundcloud-downloader.svg",
                    "tags": [
                              "media"
                    ]
          },
          {
                    "name": "YouTube Keyboard Navigator",
                    "description": "Navigate through YouTube videos using arrow keys. Enter to play, Space to open in new tab.",
                    "url": "scripts/media/youtube-navigator.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/youtube-navigator.svg",
                    "tags": [
                              "media"
                    ]
          },
          {
                    "name": "DOM Scraper Helper",
                    "description": "Công cụ scrape toàn bộ DOM trang web để đưa cho AI viết userscript",
                    "url": "scripts/productivity/dom-scraper.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/dom-scraper.svg",
                    "tags": [
                              "productivity"
                    ]
          },
          {
                    "name": "Gemini Explainer (Everywhere)",
                    "description": "Highlight text to quickly ask Google Gemini to explain it.",
                    "url": "scripts/productivity/gemini-explainer.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/gemini-explainer.svg",
                    "tags": [
                              "productivity"
                    ]
          },
          {
                    "name": "Gemini Prompt Pro",
                    "description": "A Categorized Quick-Prompt Userscript for Google Gemini",
                    "url": "scripts/productivity/gemini-prompt-pro.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/gemini-prompt-pro.svg",
                    "tags": [
                              "productivity"
                    ]
          },
          {
                    "name": "Jules Session & Message Copier (V3.4 Manual Refresh)",
                    "description": "Full bi-directional bridge with Manual Refresh button and robust state management.",
                    "url": "scripts/productivity/jules-helper.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/jules-helper.svg",
                    "tags": [
                              "productivity"
                    ]
          },
          {
                    "name": "Void Scroll",
                    "description": "Anti-doom-scrolling script that forces a 30-second blackout after 10 videos on YouTube/Facebook.",
                    "url": "scripts/productivity/void-scroll.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/void-scroll.svg",
                    "tags": [
                              "productivity"
                    ]
          },
          {
                    "name": "Weblate Quick Translator",
                    "description": "Tự động dịch và điền vào ô dịch bằng Google Translate",
                    "url": "scripts/productivity/weblate-translator.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/weblate-translator.svg",
                    "tags": [
                              "productivity"
                    ]
          },
          {
                    "name": "Facebook Anti-Toxic & Spoiler Filter",
                    "description": "Monitors the newsfeed and hides posts containing blacklisted keywords.",
                    "url": "scripts/social/anti-toxic.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/anti-toxic.svg",
                    "tags": [
                              "social"
                    ]
          },
          {
                    "name": "Gẹmixi Edition",
                    "description": "Biến Gemini thành Gẹmixi - Ask Cao Bang, Đè Tem, meme Cao Bằng",
                    "url": "scripts/social/do-mixi-gemini.user.js",
                    "icon": "https://www.google.com/s2/favicons?sz=64&domain=gemini.google.com",
                    "tags": [
                              "social"
                    ]
          },
          {
                    "name": "Facebook Chess Move Classifier",
                    "description": "Classifies Facebook messages and comments using Chess.com move evaluation icons based on vocabulary.",
                    "url": "scripts/social/fb-chess-classifier.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/anti-toxic.svg",
                    "tags": [
                              "social"
                    ]
          },
          {
                    "name": "Facebook Affiliate Comment Filter",
                    "description": "Automatically hide comments containing affiliate links or promotional keywords on Facebook.",
                    "url": "scripts/social/filter-fb-affiliate.user.js",
                    "icon": "https://github.com/hthienloc/oh-my-vibe-userscript/raw/main/assets/icons/anti-toxic.svg",
                    "tags": [
                              "social"
                    ]
          }
];

        const grid = document.getElementById('script-grid');
        const search = document.getElementById('search');
        
        let currentSearch = '';
        let currentTag = '';

        function render() {
            grid.innerHTML = '';
            const filtered = scripts.filter(s => {
                const searchMatch = s.name.toLowerCase().includes(currentSearch.toLowerCase()) || 
                                    s.description.toLowerCase().includes(currentSearch.toLowerCase());
                const tagMatch = currentTag === '' || (s.tags && s.tags.includes(currentTag));
                return searchMatch && tagMatch;
            });

            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let requirementHtml = s.requiresServer ? `
                    <div class="requirement-badge">
                        ⚠️ Requires <a href="https://github.com/hthienloc/oh-my-vibe-userscript/blob/main/src/productivity/jules-helper/server/relay_server.py" target="_blank" style="color: inherit; text-decoration: underline;">Python Relay Server</a>
                    </div>
                ` : '';

                card.innerHTML = `
                    <div>
                        <span class="tag">${s.tags.join(', ')}</span>
                        <h3 class="script-title" data-script-index="${scripts.indexOf(s)}">${s.name}</h3>
                        <p>${s.description}</p>
                        ${requirementHtml}
                    </div>
                    <a href="${s.url}" class="btn-install">Install Now</a>
                `;
                grid.appendChild(card);
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center; padding: 40px; color:#888;">No matching scripts found.</p>';
            }
            
            // Attach click listeners to titles
            document.querySelectorAll('.script-title').forEach(title => {
                title.addEventListener('click', (e) => {
                    const index = e.target.getAttribute('data-script-index');
                    openModal(scripts[index]);
                });
            });
        }
        
        // Modal logic
        const modal = document.getElementById('script-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalTag = document.getElementById('modal-tag');
        const modalVersion = document.getElementById('modal-version');
        const modalDesc = document.getElementById('modal-desc');
        const modalRequirement = document.getElementById('modal-requirement');
        const modalCode = document.getElementById('modal-code');
        const modalBtnInstall = document.getElementById('modal-btn-install');
        const modalCloseBtn = document.getElementById('modal-close');
        const modalBtnClose = document.getElementById('modal-btn-close');

        function openModal(script) {
            modalTitle.textContent = script.name;
            modalTag.textContent = script.tag;
            modalVersion.textContent = `v${script.version}`;
            modalDesc.textContent = script.description;
            
            if (script.requiresServer) {
                modalRequirement.innerHTML = `
                    <div class="requirement-badge">
                        ⚠️ Requires <a href="https://github.com/hthienloc/oh-my-vibe-userscript/blob/main/src/productivity/jules-helper/server/relay_server.py" target="_blank" style="color: inherit; text-decoration: underline;">Python Relay Server</a>
                    </div>
                `;
                modalRequirement.style.display = 'block';
            } else {
                modalRequirement.style.display = 'none';
            }
            
            modalBtnInstall.href = script.url;
            modalCode.textContent = "Loading source code...";
            
            modal.classList.add('active');
            
            // Fetch source code
            fetch(script.url)
                .then(res => res.text())
                .then(code => {
                    modalCode.textContent = code;
                })
                .catch(err => {
                    modalCode.textContent = "Error loading source code.";
                });
        }
        
        function closeModal() {
            modal.classList.remove('active');
        }
        
        modalCloseBtn.addEventListener('click', closeModal);
        modalBtnClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Event listeners for filtering
        search.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            render();
        });

        const tagChips = document.querySelectorAll('.tag-chip');
        tagChips.forEach(chip => {
            chip.addEventListener('click', (e) => {
                // Update active state
                tagChips.forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                
                // Update currentTag and render
                currentTag = e.target.getAttribute('data-tag');
                render();
            });
        });

        render();
    </script>
</body>
</html>
